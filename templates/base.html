<!doctype html>
<html lang="en" dir="ltr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ description }}" />
    {{ meta_tags }}
    <title>{{ title }} | OpenLib</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css"
      type="text/css"
    />
    <link rel="stylesheet" href="{{ base_path }}static/css/style.css" />
  </head>
  <body>
    <header>
      <h1><a href="{{ base_path }}">OpenLib</a></h1>
      <div class="search-container">
        <input
          type="search"
          id="search-input"
          placeholder="Search books and chapters..."
          autocomplete="off"
        />
        <div id="search-results" class="search-results"></div>
      </div>
      <nav>
        <!-- Navigation -->
      </nav>
      <button id="theme-toggle" aria-label="Switch to dark mode">🌙</button>
    </header>

    <main>{% block content %}{% endblock %}</main>

    <footer>
      <p>&copy; 2025 OpenLib. Licensed under CC BY-NC 4.0.</p>
      <button id="feedback-toggle" class="feedback-button">💬 Feedback</button>
      <div id="feedback-form" class="feedback-form" hidden>
        <form action="https://formspree.io/f/meewqjzj" method="POST">
          <input type="hidden" name="page" id="feedback-page" value="" />
          <label for="feedback-email">Your Email (optional):</label>
          <input
            type="email"
            name="email"
            id="feedback-email"
            placeholder="you@example.com"
          />
          <label for="feedback-message">Message:</label>
          <textarea
            name="message"
            id="feedback-message"
            rows="4"
            required
            placeholder="Report a typo, suggest an improvement..."
          ></textarea>
          <button type="submit" class="btn-submit">Send</button>
        </form>
      </div>
      <p class="build-date">Site last built: {{ build_date }}</p>
      {{ edit_link }}
    </footer>

    <script>
      window.BASE_PATH = "{{ base_path }}";
    </script>
    <script src="{{ base_path }}static/js/main.js" defer></script>

    <button id="back-to-top" class="back-to-top" aria-label="Back to top">
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>
  </body>
</html>
