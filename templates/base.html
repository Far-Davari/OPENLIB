<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A Collection of Open-Source translated books in your language!"
    />
    <title>{{ title }} | OpenLib</title>
    <link rel="stylesheet" href="{{ base_path }}static/css/style.css" />
  </head>
  <body>
    <header>
      <h1><a href="{{ base_path }}">OpenLib</a></h1>
      <div class="search-container">
        <input
          type="search"
          id="search-input"
          placeholder="Search books and chapters..."
          autocomplete="off"
        />
        <div id="search-results" class="search-results"></div>
      </div>
      <nav>
        <!-- Navigation -->
      </nav>
      <button id="theme-toggle" aria-label="Switch to dark mode">🌙</button>
    </header>

    <main>{% block content %}{% endblock %}</main>

    <footer>
      <p>&copy; 2025 OpenLib. Licensed under CC BY-NC 4.0.</p>
    </footer>

    <script>
      window.BASE_PATH = "{{ base_path }}";
    </script>
    <script src="{{ base_path }}static/js/main.js" defer></script>
  </body>
</html>
