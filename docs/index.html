<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A Collection of Open-Source translated books in your language!"
    />
    <title>OpenLib - Home | OpenLib</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <header>
      <h1><a href="/">OpenLib</a></h1>
      <div class="search-container">
        <input type="search" id="search-input" placeholder="Search books and chapters..." autocomplete="off">
        <div id="search-results" class="search-results"></div>
      </div>
      <nav>
        <!-- Navigation -->
      </nav>
      <button id="theme-toggle" aria-label="Switch to dark mode">🌙</button>
    </header>

    <main>
        <h2>Available Books</h2>
        <div class="bookshelf">
            
            <a href="after-dark/" class="book-card">
                <h3>After Dark</h3>
                <p class="author">by Haruki Murakami</p>
                <p class="chapters-count">5 chapters</p>
            </a>
            
        </div>
        </main>

    <footer>
      <p>&copy; 2025 OpenLib. Licensed under CC BY-NC 4.0.</p>
    </footer>

    <script src="/static/js/main.js" defer></script>
  </body>
</html>
