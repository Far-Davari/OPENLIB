            <script id="glossary-data" type="application/json">[{"term": "نئون", "definition": "گازی بی‌اثر که در لامپ‌های روشنایی و تابلوهای تبلیغاتی برای تولید نورهای رنگی درخشان به کار می‌رود."}, {"term": "هیپ‌هاپ", "definition": "سبکی از موسیقی و فرهنگ خیابانی که در دههٔ ۱۹۷۰ در آمریکا شکل گرفت و با ضرب‌آهنگ‌های قوی و کلام آهنگین شناخته می‌شود."}, {"term": "کارائوکه", "definition": "سرگرمی محبوب ژاپنی که در آن افراد با پخش موسیقی بی‌کلام، متن ترانه را از روی نمایشگر می‌خوانند."}, {"term": "بوستون ردساکس", "definition": "تیم بیسبال حرفه‌ای آمریکایی از شهر بوستون که در لیگ برتر بیسبال (MLB) بازی می‌کند. حرف 'B' نشان معروف این تیم است."}, {"term": "پِچ مِلْبا", "definition": "دسری کلاسیک شامل نصف هلو، بستنی وانیلی و سس تمشک که به افتخار خوانندهٔ اپرای استرالیایی، نلی ملبا، نام‌گذاری شده است."}, {"term": "جورج اورول", "definition": "نویسندهٔ انگلیسی (۱۹۰۳-۱۹۵۰) که با رمان‌های پادآرمان‌شهری '۱۹۸۴' و 'مزرعهٔ حیوانات' به شهرت رسید. نقدش بر تمامیت‌خواهی و نظارت دولتی شهرت دارد."}, {"term": "دنیز", "definition": "رستوران زنجیره‌ای آمریکایی که به صورت ۲۴ ساعته باز است و به خاطر صبحانه و منوی متنوعش شناخته می‌شود؛ در داستان محل وقوع روایت شبانه است."}, {"term": "شیناگاوا", "definition": "یکی از مناطق ویژهٔ توکیو، مرکز مهم تجاری و حمل‌ونقل که هتل‌ها و مراکز تفریحی زیادی را در خود جای داده است."}, {"term": "هاوایی", "definition": "مجمع‌الجزایری در اقیانوس آرام و یکی از ایالت‌های آمریکا که به خاطر سواحل، آتشفشان‌ها و فرهنگ بومی‌اش شهرت دارد."}, {"term": "هیوشی", "definition": "محله‌ای در منطقهٔ کوهوکو-کو در یوکوهاما که بیشتر منطقه‌ای مسکونی است و دسترسی خوبی به مرکز توکیو دارد."}, {"term": "کوئنجی", "definition": "محله‌ای در منطقهٔ سوگینامی توکیو که به خاطر فرهنگ زیرزمینی، فروشگاه‌های موسیقی قدیمی و فضای بوهمیایی‌اش شناخته می‌شود."}, {"term": "کورتیس فولر", "definition": "نوازندهٔ آمریکایی ترومبون جاز (متولد ۱۹۳۴) که با گروه‌های مشهوری چون آرت بلیکی و جز مسنجرز همکاری داشت و در قطعهٔ 'فایو اسپات افتر دارک' نوازندگی کرده است."}, {"term": "فایو اسپات افتر دارک", "definition": "قطعهٔ جاز مشهوری از کورتیس فولر که نخستین بار در آلبوم 'Blues-ette' (۱۹۵۹) منتشر شد؛ عنوان قطعه اشاره به کلاب شبانه‌ای مشهور در نیویورک دارد."}, {"term": "ال‌پی", "definition": "صفحهٔ گرامافون بلندمدت (Long Play) که با سرعت ۳۳ دور در دقیقه پخش می‌شود و از دههٔ ۱۹۵۰ تا ۱۹۸۰ فرمت اصلی ضبط و پخش موسیقی بود."}, {"term": "برت باکاراک", "definition": "آهنگساز و پیانیست آمریکایی (۱۹۲۸-۲۰۲۳) که با ملودی‌های پیچیده و تنظیم‌های ارکسترالش در موسیقی پاپ قرن بیستم تحول ایجاد کرد."}, {"term": "گوچی", "definition": "برند ایتالیایی کالاهای لوکس (تأسیس ۱۹۲۱) که به خاطر کیف‌های چرمی، کفش‌ها و طراحی‌های شیک و گران‌قیمتش شهرت جهانی دارد."}, {"term": "پرادا", "definition": "خانهٔ مد ایتالیایی (تأسیس ۱۹۱۳) که در زمینهٔ پوشاک، کیف و اکسسوری‌های لوکس فعالیت می‌کند و به طراحی‌های مینیمال و نوآورانه‌اش معروف است."}, {"term": "موراکامی", "definition": "هاروکی موراکامی، نویسندهٔ مشهور ژاپنی (زادهٔ ۱۹۴۹) که رمان‌هایش ترکیبی از رئالیسم جادویی، تنهایی مدرن و ارجاعات موسیقایی است."}, {"term": "شینجوکو", "definition": "منطقه‌ای پرجنب‌وجوش در توکیو، مرکز تفریحات شبانه، آسمان‌خراش‌ها و شلوغ‌ترین ایستگاه قطار جهان."}, {"term": "توکیو", "definition": "پایتخت ژاپن، یکی از بزرگترین و مدرن‌ترین کلان‌شهرهای جهان با ترکیبی از فرهنگ سنتی و فناوری پیشرفته."}]</script>
